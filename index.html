<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ورود به کتابخانه نگار</title>
    <style>
        body {
            background: #0d1b2a;
            color: white;
            font-family: Tahoma;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #1b2f4a;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        input, button {
            padding: 10px;
            margin: 10px 0;
            width: 100%;
            border-radius: 10px;
            border: none;
        }
        button {
            background: #4fc3f7;
            font-weight: bold;
            cursor: pointer;
        }
        a {
            color: #4fc3f7;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>📚 کتابخانه نگار</h1>
        <p>لطفاً کد ۱۰ رقمی خود را وارد کنید</p>
        <input type="text" placeholder="مثال: ۱۲۳۴۵۶۷۸۹۰">
        <button>ورود</button>
        <p>حساب ندارید؟ <a href="register.html">ثبت‌نام کنید</a>
        <br>
        <a href="index.html">← بازگشت به خانه</a>
    </div>
</body>
</html>
