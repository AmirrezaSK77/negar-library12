<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 کتابخانه نگار</title>
    <style>
        body {
            background: linear-gradient(135deg, #0d1b2a, #1b2f4a);
            color: white;
            font-family: 'Tahoma', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 500px;
        }
        h1 {
            font-size: 3rem;
            color: #4fc3f7;
            text-shadow: 0 0 30px rgba(79,195,247,0.3);
            margin-bottom: 10px;
        }
        .subtitle {
            color: #b0bec5;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #4fc3f7;
            color: #0d1b2a;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(79,195,247,0.5);
        }
        .loading {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .diamond {
            font-size: 4rem;
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="diamond">💎</div>
        <h1>کتابخانه نگار</h1>
        <p class="subtitle">هزاران کتاب رایگان در گوشی شما ❗</p>
        <p class="loading" style="color:#78909c;">در حال بارگذاری...</p>
        <a href="login.html" class="btn">🚀 ورود به کتابخانه</a>
    </div>
</body>
</html>
